# This workflow runs on Node.js 20.x, 22.x, and 24.x.
# Lint and typecheck run on all versions.
# Coverage (with threshold enforcement) runs only on 24.x to avoid duplicate reports.
# All other versions run the test suite without coverage.
name: Node.js CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run lint
    - run: npm run build --if-present
    - run: npm run test:coverage
      if: matrix.node-version == '24.x'
    - run: npm test
      if: matrix.node-version != '24.x'
